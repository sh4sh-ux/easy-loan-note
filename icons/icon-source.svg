  <!-- fountain pen (12% smaller), nib tip meeting the signature at (300,343) -->
  <g filter="url(#penShadow)" transform="translate(300 343) rotate(40) scale(0.79)">
    <!-- barrel -->
    <rect x="-17" y="-244" width="34" height="128" rx="17" fill="url(#barrel)"/>
    <!-- clip -->
    <rect x="8" y="-236" width="9" height="58" rx="4.5" fill="url(#gold)"/>
    <!-- cap band -->
    <rect x="-17" y="-136" width="34" height="16" rx="3" fill="url(#gold)"/>
    <!-- grip section -->
    <path d="M-16 -122 L16 -122 L14 -90 L-14 -90 Z" fill="#082C5E"/>
    <!-- gold collar ring at nib base -->
    <rect x="-16" y="-88" width="32" height="15" rx="4" fill="url(#gold)"/>
    <!-- gold nib -->
    <path d="M0 0 C 11 -20 23 -36 25 -54 L 15 -73 Q 0 -78 -15 -73 L -25 -54 C -23 -36 -11 -20 0 0 Z"
          fill="url(#gold)"/>
    <!-- breather hole + slit -->
    <circle cx="0" cy="-50" r="6.5" fill="#96701E"/>
    <rect x="-2.2" y="-50" width="4.4" height="42" rx="2.2" fill="#96701E"/>
  </g>
  </g>
</svg>
